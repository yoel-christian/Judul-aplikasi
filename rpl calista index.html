<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resep Minuman Sehat</title>

  <!-- CSS -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4fff7;
    }

    header {
      background: #2ecc71;
      padding: 20px;
      text-align: center;
      color: white;
    }

    header input {
      margin-top: 10px;
      padding: 10px;
      width: 80%;
      max-width: 400px;
      border: none;
      border-radius: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
    }

    .hidden {
      display: none;
    }

    #close {
      float: right;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HTML -->
  <header>
    <h1>🥤 Resep Minuman Sehat</h1>
    <input type="text" id="search" placeholder="Cari minuman sehat..."/>
  </header>

  <main>
    <div id="recipe-list" class="grid"></div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close">&times;</span>
      <h2 id="modal-title"></h2>
      <p id="modal-ingredients"></p>
      <p id="modal-steps"></p>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    const recipes = [
      {
        title: "Jus Detox Hijau",
        ingredients: "Bayam, apel, lemon, air",
        steps: "Blender semua bahan hingga halus lalu sajikan dingin."
      },
      {
        title: "Smoothie Pisang Oat",
        ingredients: "Pisang, oat, susu almond, madu",
        steps: "Blender hingga lembut. Cocok untuk sarapan sehat."
      },
      {
        title: "Infused Water Jeruk Mint",
        ingredients: "Jeruk, daun mint, air dingin",
        steps: "Diamkan di kulkas minimal 2 jam sebelum diminum."
      }
    ];

    const list = document.getElementById("recipe-list");
    const search = document.getElementById("search");

    function display(data) {
      list.innerHTML = "";
      data.forEach(r => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h3>${r.title}</h3><p>${r.ingredients}</p>`;
        card.onclick = () => openModal(r);
        list.appendChild(card);
      });
    }

    search.addEventListener("input", e => {
      const keyword = e.target.value.toLowerCase();
      const filtered = recipes.filter(r =>
        r.title.toLowerCase().includes(keyword)
      );
      display(filtered);
    });

    const modal = document.getElementById("modal");
    const closeBtn = document.getElementById("close");

    function openModal(r) {
      modal.classList.remove("hidden");
      document.getElementById("modal-title").textContent = r.title;
      document.getElementById("modal-ingredients").textContent = "Bahan: " + r.ingredients;
      document.getElementById("modal-steps").textContent = "Cara: " + r.steps;
    }

    closeBtn.onclick = () => modal.classList.add("hidden");

    window.onclick = e => {
      if (e.target === modal) modal.classList.add("hidden");
    };

    display(recipes);
  </script>

</body>
</html>
